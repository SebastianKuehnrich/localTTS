<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f0f13;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: #18181b;
            border-bottom: 1px solid #27272a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fafafa;
        }

        header h1 span { color: #8b5cf6; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #71717a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected { background: #22c55e; }

        /* Tabs */
        .tabs {
            display: flex;
            background: #18181b;
            border-bottom: 1px solid #27272a;
            padding: 0 24px;
        }

        .tab {
            padding: 10px 20px;
            font-size: 14px;
            color: #71717a;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover { color: #a1a1aa; }
        .tab.active { color: #8b5cf6; border-bottom-color: #8b5cf6; }

        /* Main Content */
        .content { flex: 1; display: flex; overflow: hidden; }

        .tab-panel { display: none; flex: 1; flex-direction: column; }
        .tab-panel.active { display: flex; }

        /* Chat Panel */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #7c3aed;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #27272a;
            border-bottom-left-radius: 4px;
        }

        .message.assistant .text { min-height: 20px; }

        .message.system {
            align-self: center;
            background: transparent;
            color: #52525b;
            font-size: 12px;
            padding: 4px;
        }

        /* Confidence Badge */
        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .confidence-badge.high { background: #052e16; color: #4ade80; }
        .confidence-badge.medium { background: #422006; color: #fb923c; }
        .confidence-badge.low { background: #450a0a; color: #f87171; }

        .confidence-bar {
            width: 60px;
            height: 4px;
            background: #3f3f46;
            border-radius: 2px;
            overflow: hidden;
        }

        .confidence-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .confidence-bar-fill.high { background: #4ade80; }
        .confidence-bar-fill.medium { background: #fb923c; }
        .confidence-bar-fill.low { background: #f87171; }

        /* Chat Input */
        .chat-input-area {
            padding: 16px 24px;
            background: #18181b;
            border-top: 1px solid #27272a;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 10px;
            color: #fafafa;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus { border-color: #7c3aed; }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 12px 20px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover { background: #6d28d9; }
        .send-btn:disabled { background: #3f3f46; cursor: not-allowed; }

        /* Confidence Tester Panel */
        .confidence-panel {
            padding: 24px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        .confidence-panel h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #a1a1aa;
        }

        .confidence-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px 16px;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 10px;
            color: #fafafa;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
        }

        .confidence-textarea:focus { border-color: #7c3aed; }

        .confidence-result {
            margin-top: 20px;
            padding: 20px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            display: none;
        }

        .confidence-result.visible { display: block; }

        .score-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-number {
            font-size: 48px;
            font-weight: 700;
        }

        .score-number.high { color: #4ade80; }
        .score-number.medium { color: #fb923c; }
        .score-number.low { color: #f87171; }

        .score-label {
            font-size: 14px;
            color: #71717a;
            margin-top: 4px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .detail-card {
            padding: 12px;
            background: #27272a;
            border-radius: 8px;
        }

        .detail-card .label {
            font-size: 12px;
            color: #71717a;
            margin-bottom: 4px;
        }

        .detail-card .value {
            font-size: 18px;
            font-weight: 600;
        }

        /* Health Panel */
        .health-panel {
            padding: 24px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        .health-card {
            padding: 20px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .health-card pre {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #a1a1aa;
            white-space: pre-wrap;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: #27272a;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .refresh-btn:hover { background: #3f3f46; }

        /* Streaming cursor */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #8b5cf6;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>
    <header>
        <h1><span>Voice Agent</span> API</h1>
        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Verbinde...</span>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" data-tab="chat">Chat</div>
        <div class="tab" data-tab="confidence">Confidence Tester</div>
        <div class="tab" data-tab="health">Health</div>
    </div>

    <div class="content">
        <!-- Chat Tab -->
        <div class="tab-panel active" id="tab-chat">
            <div class="chat-messages" id="chatMessages">
                <div class="message system">Sende eine Nachricht um das Gespraech zu starten.</div>
            </div>
            <div class="chat-input-area">
                <div class="input-row">
                    <input type="text" class="chat-input" id="chatInput"
                           placeholder="Nachricht eingeben..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">Senden</button>
                </div>
            </div>
        </div>

        <!-- Confidence Tester Tab -->
        <div class="tab-panel" id="tab-confidence">
            <div class="confidence-panel">
                <h2>Text auf Konfidenz analysieren</h2>
                <textarea class="confidence-textarea" id="confInput"
                          placeholder="Text eingeben, z.B. eine LLM-Antwort..."></textarea>
                <button class="send-btn" id="confBtn" style="width:100%">Analysieren</button>

                <div class="confidence-result" id="confResult">
                    <div class="score-display">
                        <div class="score-number" id="confScore">0.00</div>
                        <div class="score-label" id="confLabel">—</div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-card">
                            <div class="label">Hedging-Ausdruecke</div>
                            <div class="value" id="confHedging">0</div>
                        </div>
                        <div class="detail-card">
                            <div class="label">Konfidenz-Marker</div>
                            <div class="value" id="confMarkers">0</div>
                        </div>
                        <div class="detail-card">
                            <div class="label">Verweigerung</div>
                            <div class="value" id="confRefusal">Nein</div>
                        </div>
                        <div class="detail-card">
                            <div class="label">Textlaenge</div>
                            <div class="value" id="confLength">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Health Tab -->
        <div class="tab-panel" id="tab-health">
            <div class="health-panel">
                <button class="refresh-btn" id="healthRefresh">Aktualisieren</button>
                <div class="health-card">
                    <pre id="healthOutput">Lade...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const history = [];

        // ── Tabs ──────────────────────────────────────────
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // ── Health Check ──────────────────────────────────
        async function checkHealth() {
            try {
                const r = await fetch(API + '/health');
                const data = await r.json();
                document.getElementById('healthOutput').textContent = JSON.stringify(data, null, 2);
                document.getElementById('statusDot').className =
                    'status-dot' + (data.status === 'healthy' ? ' connected' : '');
                document.getElementById('statusText').textContent =
                    data.status === 'healthy' ? 'Verbunden' : 'Fehler';
            } catch (e) {
                document.getElementById('healthOutput').textContent = 'Fehler: ' + e.message;
                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        document.getElementById('healthRefresh').addEventListener('click', checkHealth);
        checkHealth();

        // ── Chat (Streaming) ──────────────────────────────
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            const textSpan = document.createElement('span');
            textSpan.className = 'text';
            textSpan.textContent = text;
            div.appendChild(textSpan);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function addConfidenceBadge(messageDiv, confidence) {
            const badge = document.createElement('div');
            badge.className = 'confidence-badge ' + confidence.label;

            const bar = document.createElement('div');
            bar.className = 'confidence-bar';
            const fill = document.createElement('div');
            fill.className = 'confidence-bar-fill ' + confidence.label;
            fill.style.width = (confidence.score * 100) + '%';
            bar.appendChild(fill);

            badge.innerHTML = 'Confidence: ' + (confidence.score * 100).toFixed(0) + '% ';
            badge.appendChild(bar);
            messageDiv.appendChild(badge);
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;

            addMessage('user', text);

            // Create assistant message with streaming cursor
            const assistantDiv = addMessage('assistant', '');
            const textSpan = assistantDiv.querySelector('.text');
            const cursor = document.createElement('span');
            cursor.className = 'streaming-cursor';
            assistantDiv.appendChild(cursor);

            let fullText = '';

            try {
                const response = await fetch(API + '/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: history })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'token') {
                            fullText += data.text;
                            textSpan.textContent = fullText;
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        } else if (data.type === 'done') {
                            cursor.remove();
                            addConfidenceBadge(assistantDiv, data.confidence);
                        } else if (data.type === 'error') {
                            cursor.remove();
                            textSpan.textContent = 'Fehler: ' + data.message;
                        }
                    }
                }

                // Update history
                history.push({ role: 'user', content: text });
                history.push({ role: 'assistant', content: fullText });

            } catch (e) {
                cursor.remove();
                textSpan.textContent = 'Verbindungsfehler: ' + e.message;
            }

            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Confidence Tester ─────────────────────────────
        document.getElementById('confBtn').addEventListener('click', async () => {
            const text = document.getElementById('confInput').value.trim();
            if (!text) return;

            try {
                const r = await fetch(API + '/confidence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await r.json();

                const result = document.getElementById('confResult');
                result.classList.add('visible');

                const scoreEl = document.getElementById('confScore');
                scoreEl.textContent = (data.score * 100).toFixed(0) + '%';
                scoreEl.className = 'score-number ' + data.label;

                const labels = { high: 'Hohe Konfidenz', medium: 'Mittlere Konfidenz', low: 'Niedrige Konfidenz' };
                document.getElementById('confLabel').textContent = labels[data.label] || data.label;
                document.getElementById('confHedging').textContent = data.hedging_count;
                document.getElementById('confMarkers').textContent = data.confidence_marker_count;
                document.getElementById('confRefusal').textContent = data.has_refusal ? 'Ja' : 'Nein';
                document.getElementById('confLength').textContent = data.response_length + ' Zeichen';
            } catch (e) {
                alert('Fehler: ' + e.message);
            }
        });
    </script>
</body>
</html>
